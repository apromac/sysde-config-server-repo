# ========== PORT
server.port=9001

# ========== BASE DE DONNEES
spring.datasource.url=jdbc:postgresql://localhost:5434/sysdedb
spring.datasource.username=postgres
spring.datasource.password=adminpostgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========== POOL DE CONNEXIONS (optionnel)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
#spring.datasource.hikari.jdbc-url=jdbc:postgresql://localhost:5434/sysdedb
#spring.datasource.hikari.username=postgres
#spring.datasource.hikari.password=adminpostgres

# ========== LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.engine.jdbc.connections=TRACE
logging.level.org.springframework.jdbc.datasource=DEBUG

# ========== SPRINGDOC OPENAPI
# Tri des tags et des opķrations par ordre alphabķtique
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Ajoute une barre de recherche (utile si vous avez beaucoup d'APIs)
springdoc.swagger-ui.filter=true

# Dķsactive le bouton "Try it out" par dķfaut si besoin
# springdoc.swagger-ui.try-it-out-enabled=false

# URL personnalisķe pour plus de sķcuritķ
# springdoc.swagger-ui.path=/api-docs.html

# ========= SCALAR
# Activation et chemin personnalisķ
#scalar.enabled=true
#scalar.path=/doc

# Style et ThĶme
springdoc.scalar.theme=deepSpace
springdoc.scalar.dark-mode=true
#scalar.theme=deepSpace
#scalar.darkMode=true

# Fonctionnalitķs UI
#scalar.hideSearch=false
#scalar.searchHotKey=ctrl+k
#scalar.layout=modern
scalar.showToolbar= "never"

