# ========== PORT
server.port=9103

# ========== EUREKA
# Configuration Eureka pour que la Gateway trouve les autres services 8761
eureka.client.service-url.defaultZone=http://localhost:9102/eureka/

# ========== GATEWAY
# DÈfinition des routes
# Exemple : rediriger http://localhost:9102/core/** vers le microservice sysde-core
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#spring.cloud.gateway.mvc.routes[0].id=core-route
#spring.cloud.gateway.mvc.routes[0].uri=lb://SYSDE-CORE
#spring.cloud.gateway.mvc.routes[0].predicates[0].name=Path
#spring.cloud.gateway.mvc.routes[0].predicates[0].args.pattern=/core/**
#spring.cloud.gateway.mvc.routes[0].filters[0].name=StripPrefix
#spring.cloud.gateway.mvc.routes[0].filters[0].args.parts=1

# Activer l'agrÈgation des documentations des microservices
springdoc.swagger-ui.urls[0].name=Core Service
springdoc.swagger-ui.urls[0].url=/core/v3/api-docs

# Permettre ‡ la Gateway de propager les dÈfinitions OpenAPI
springdoc.api-docs.enabled=true

