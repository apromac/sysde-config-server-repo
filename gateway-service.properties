# ========== PORT
server.port=9103

# ========== EUREKA
# Configuration Eureka pour que la Gateway trouve les autres services 8761
eureka.client.service-url.defaultZone=http://localhost:9102/eureka/

# DÕfinition des routes
# Exemple : rediriger http://localhost:9102/core/** vers le microservice core-service
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route manuelle (plus prÕcise)
spring.cloud.gateway.routes[0].id=core-route
spring.cloud.gateway.routes[0].uri=lb://sysde-core
spring.cloud.gateway.routes[0].predicates[0]=Path=/core/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Activer l'agrÕgation des documentations des microservices
springdoc.swagger-ui.urls[0].name=Core Service
springdoc.swagger-ui.urls[0].url=/core/v3/api-docs

# Permettre Á la Gateway de propager les dÕfinitions OpenAPI
springdoc.api-docs.enabled=true